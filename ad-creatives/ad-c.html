<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1080px;height:1350px;overflow:hidden;font-family:'Inter',sans-serif}
  .ad{width:1080px;height:1350px;position:relative;overflow:hidden;background:#070707;color:#fff;display:flex;flex-direction:column;align-items:center;padding:70px 64px 54px;text-align:center}
  .ad::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 75% 50% at 50% 4%, rgba(37,211,102,.13), transparent 58%),radial-gradient(ellipse 80% 55% at 50% 100%, rgba(212,175,55,.13), transparent 55%)}
  .ad::after{content:'';position:absolute;inset:14px;border:1px solid rgba(212,175,55,.28);border-radius:26px;pointer-events:none}
  .inner{position:relative;z-index:2;width:100%;display:flex;flex-direction:column;align-items:center;height:100%}
  .logo{font-family:'Playfair Display',serif;font-weight:900;font-size:40px;letter-spacing:7px;color:#D4AF37;text-shadow:0 0 50px rgba(212,175,55,.4)}
  .logo small{display:block;font-family:'Inter';font-weight:300;font-size:12px;letter-spacing:8px;color:#888;text-transform:uppercase;margin-top:6px}
  .ribbon{margin-top:42px;font-size:20px;letter-spacing:4px;text-transform:uppercase;color:#25d366;font-weight:700;border:1px solid rgba(37,211,102,.4);background:rgba(37,211,102,.08);padding:10px 22px;border-radius:999px}
  h1{font-family:'Playfair Display',serif;font-weight:800;font-size:74px;line-height:1.06;margin-top:30px;letter-spacing:-1px}
  h1 .g{color:#D4AF37}
  .big0{font-family:'Playfair Display',serif;font-weight:900;font-size:200px;line-height:.9;color:#fff;margin-top:18px;text-shadow:0 0 70px rgba(37,211,102,.3)}
  .big0 b{color:#25d366}
  .today{font-size:26px;letter-spacing:6px;text-transform:uppercase;color:#cfcfcf;font-weight:500;margin-top:4px}
  /* steps */
  .steps{display:flex;gap:0;width:100%;margin-top:46px;border-top:1px solid rgba(212,175,55,.18);border-bottom:1px solid rgba(212,175,55,.18);padding:28px 0}
  .stp{flex:1;text-align:center;position:relative}
  .stp+.stp::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:1px;background:rgba(255,255,255,.08)}
  .stp .n{font-size:15px;color:#D4AF37;font-weight:700;letter-spacing:2px}
  .stp b{display:block;font-size:21px;font-weight:800;margin-top:8px}
  .stp span{font-size:14px;color:#888;margin-top:3px;display:block}
  .final{margin-top:auto;font-size:30px;font-weight:600;color:#fff}
  .final b{color:#D4AF37;font-family:'Playfair Display',serif;font-weight:900;font-size:46px;vertical-align:-4px;margin:0 4px}
  .cta{margin-top:26px;width:100%;background:linear-gradient(135deg,#1faa55,#25d366);border-radius:16px;display:flex;align-items:center;justify-content:center;gap:16px;padding:24px;box-shadow:0 24px 50px -22px rgba(37,211,102,.8)}
  .cta svg{width:40px;height:40px;fill:#04230f}
  .cta .txt{color:#04230f}
  .cta .txt b{display:block;font-size:27px;font-weight:900;line-height:1}
  .cta .txt span{font-size:16px;font-weight:600;opacity:.85}
</style></head>
<body>
<div class="ad"><div class="inner">
  <div class="logo">VGA<small>Vista Growth Agency</small></div>
  <div class="ribbon">✅ Cero riesgo para ti</div>
  <h1>Tu sitio web <span class="g">profesional</span>.<br>Hoy pagas...</h1>
  <div class="big0">$<b>0</b></div>
  <div class="today">Sí, cero adelanto</div>
  <div class="steps">
    <div class="stp"><div class="n">1</div><b>Nos escribes</b><span>Por WhatsApp</span></div>
    <div class="stp"><div class="n">2</div><b>Lo construimos</b><span>En 48 horas</span></div>
    <div class="stp"><div class="n">3</div><b>Pagas si te gusta</b><span>No antes</span></div>
  </div>
  <div class="final">Y al final, solo <b>$197</b> si quedas feliz.</div>
  <div class="cta">
    <svg viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163a11.867 11.867 0 01-1.587-5.945C.16 5.335 5.495 0 12.05 0a11.817 11.817 0 018.413 3.488 11.824 11.824 0 013.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 01-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.86 9.86 0 001.51 5.26l-.999 3.648 3.978-1.043z"/></svg>
    <div class="txt"><b>EMPIEZA GRATIS</b><span>Escríbenos por WhatsApp</span></div>
  </div>
</div></div>
</body></html>
