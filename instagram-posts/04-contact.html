<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; }
  .post {
    width: 1080px; height: 1080px;
    background: #0A0A0A;
    position: relative; overflow: hidden;
    font-family: 'Inter', sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 60px;
  }
  .post::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 30%, rgba(212,175,55,0.08) 0%, transparent 60%);
  }
  .card {
    position: relative; z-index: 1;
    width: 100%; max-width: 800px;
    background: #131313;
    border: 1px solid rgba(212,175,55,0.2);
    border-radius: 24px;
    padding: 60px;
    text-align: center;
  }
  .card-header {
    margin-bottom: 40px;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 64px; font-weight: 800;
    color: #D4AF37;
    letter-spacing: 8px;
    text-shadow: 0 0 40px rgba(212,175,55,0.2);
  }
  .agency {
    font-size: 14px; color: #888;
    letter-spacing: 8px; text-transform: uppercase;
    margin-top: 4px;
  }
  .tagline-small {
    font-family: 'Playfair Display', serif;
    font-size: 18px; color: #D4AF37;
    font-style: italic; margin-top: 12px;
  }
  .divider {
    width: 80px; height: 1px;
    background: linear-gradient(90deg, transparent, #D4AF37, transparent);
    margin: 30px auto;
  }
  .cta-bar {
    background: linear-gradient(135deg, #D4AF37, #B8960C);
    color: #0A0A0A;
    font-size: 16px; font-weight: 700;
    padding: 14px;
    border-radius: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 36px;
  }
  .contact-items {
    display: flex; flex-direction: column;
    gap: 18px; text-align: left;
  }
  .contact-item {
    display: flex; align-items: center;
    gap: 16px; padding: 12px 20px;
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
  }
  .contact-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .icon-wa { background: rgba(37,211,102,0.15); }
  .icon-email { background: rgba(234,67,53,0.15); }
  .icon-ig { background: rgba(193,53,132,0.15); }
  .icon-loc { background: rgba(212,175,55,0.15); }
  .icon-web { background: rgba(212,175,55,0.15); }
  .contact-label {
    font-size: 11px; color: #666;
    text-transform: uppercase; letter-spacing: 2px;
    margin-bottom: 2px;
  }
  .contact-value {
    font-size: 16px; color: #EEE; font-weight: 500;
  }
  .bottom-bar {
    position: relative; z-index: 1;
    margin-top: 30px;
    display: flex; gap: 24px;
    align-items: center;
  }
  .lang-badge {
    padding: 8px 18px;
    border: 1px solid rgba(212,175,55,0.3);
    border-radius: 100px;
    font-size: 13px; color: #D4AF37;
    letter-spacing: 1px;
  }
</style></head>

  </div>
  <div class="bottom-bar">

</body></html>
