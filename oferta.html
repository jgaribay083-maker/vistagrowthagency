<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sitio Web Profesional $197 · Vista Growth Agency</title>
<meta name="description" content="Sitio web profesional para tu negocio por $197. Pagas solo cuando lo veas terminado. Listo en 48 horas. Phoenix, AZ.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070707;--bg-soft:#0e0e0f;--panel:#121214;--panel-2:#16161a;
    --line:rgba(212,175,55,.18);--line-soft:rgba(255,255,255,.07);
    --gold:#D4AF37;--gold-soft:#e7cd72;--txt:#f5f5f4;--txt-dim:#9b9b9b;--txt-faint:#666;
    --ok:#3ecf8e;--radius:16px;--maxw:680px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(ellipse 80% 50% at 50% -10%, rgba(212,175,55,.10), transparent 60%),radial-gradient(ellipse 60% 40% at 90% 110%, rgba(212,175,55,.05), transparent 60%)}
  .wrap{position:relative;z-index:1;max-width:var(--maxw);margin:0 auto;padding:0 20px 120px}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:22px 4px 10px}
  .brand{font-family:'Playfair Display',serif;font-weight:800;font-size:26px;letter-spacing:4px;color:var(--gold);text-shadow:0 0 30px rgba(212,175,55,.35)}
  .brand small{display:block;font-family:'Inter';font-weight:300;font-size:9px;letter-spacing:5px;color:var(--txt-faint);text-transform:uppercase;margin-top:2px}
  /* language switch */
  .lang{display:inline-flex;border:1px solid var(--line-soft);border-radius:999px;overflow:hidden;background:var(--bg-soft)}
  .lang button{font-family:inherit;font-size:12px;font-weight:600;letter-spacing:1px;padding:7px 13px;background:transparent;color:var(--txt-faint);border:0;cursor:pointer;transition:.2s}
  .lang button.on{background:rgba(212,175,55,.14);color:var(--gold-soft)}

  .hero{padding:30px 0 10px;text-align:center}
  .eyebrow{display:inline-flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);border:1px solid var(--line);border-radius:999px;padding:8px 16px;margin-bottom:26px;background:rgba(212,175,55,.05)}
  .eyebrow span{color:var(--txt-faint)}
  h1{font-family:'Playfair Display',serif;font-weight:800;font-size:clamp(34px,8vw,56px);line-height:1.05;letter-spacing:-.5px;margin-bottom:18px}
  h1 .g{color:var(--gold)}
  .sub{font-size:clamp(15px,3.6vw,18px);color:var(--txt-dim);font-weight:300;max-width:520px;margin:0 auto 30px}

  .offer{border:1px solid var(--line);border-radius:var(--radius);background:linear-gradient(160deg,var(--panel),#0c0c0e);padding:26px 24px;margin:0 auto 34px;max-width:440px;box-shadow:0 30px 80px -40px rgba(212,175,55,.4)}
  .offer .price{font-family:'Playfair Display',serif;font-weight:900;font-size:64px;line-height:1;color:#fff}
  .offer .price b{color:var(--gold);font-weight:900}
  .offer .price .one{display:block;font-family:'Inter';font-weight:500;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-soft);margin-bottom:6px}
  .offer .pay{font-size:13px;color:var(--txt-dim);margin-top:8px;letter-spacing:.3px}

  .perks{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:0 auto 36px;max-width:520px}
  .perk{border:1px solid var(--line-soft);border-radius:12px;background:var(--bg-soft);padding:16px 8px;text-align:center}
  .perk .ic{font-size:22px;margin-bottom:8px;display:block}
  .perk b{display:block;font-size:12px;font-weight:600;letter-spacing:.3px;margin-bottom:3px}
  .perk span{font-size:10px;color:var(--txt-faint);text-transform:uppercase;letter-spacing:1px}

  /* Vista Previa: ventana de navegador con mini-sitio (hecho a mano, editable) */
  .pv-label{text-align:center;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);font-weight:600;margin:6px 0 14px}
  .preview{max-width:540px;margin:0 auto 6px;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#0b0b0d;box-shadow:0 40px 90px -42px rgba(0,0,0,.92),0 0 60px -28px rgba(212,175,55,.35);animation:pvFloat 6s ease-in-out infinite}
  @keyframes pvFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  .pv-bar{display:flex;align-items:center;gap:7px;padding:10px 13px;background:#141416;border-bottom:1px solid var(--line-soft)}
  .pv-bar .d{width:9px;height:9px;border-radius:50%;background:#3a3a3d}
  .pv-bar .d.r{background:#ff5f57}.pv-bar .d.y{background:#febc2e}.pv-bar .d.g{background:#28c840}
  .pv-url{margin-left:8px;flex:1;height:19px;border-radius:6px;background:#09090b;border:1px solid var(--line-soft);display:flex;align-items:center;padding:0 11px;font-size:9.5px;color:var(--txt-faint);letter-spacing:.5px}
  .pv-body{padding:16px 16px 18px;background:radial-gradient(120% 80% at 50% 0%,rgba(212,175,55,.09),transparent 60%),#09090b}
  .pv-nav{display:flex;align-items:center;gap:7px;margin-bottom:14px}
  .pv-nav .lg{font-family:'Playfair Display',serif;font-weight:800;font-size:12px;color:var(--gold);letter-spacing:1px}
  .pv-nav .sp{flex:1}
  .pv-nav i{width:24px;height:5px;border-radius:3px;background:rgba(255,255,255,.13)}
  .pv-hero{text-align:center;padding:8px 0 16px}
  .pv-hero .l{height:10px;border-radius:5px;margin:0 auto 8px;background:linear-gradient(90deg,#fff,rgba(255,255,255,.55));width:72%}
  .pv-hero .l.g{background:linear-gradient(90deg,var(--gold),var(--gold-soft));width:56%}
  .pv-hero .l.s{width:42%;height:6px;background:rgba(255,255,255,.22)}
  .pv-hero .b{width:96px;height:23px;border-radius:7px;margin:13px auto 0;background:linear-gradient(135deg,var(--gold),var(--gold-soft));box-shadow:0 8px 20px -8px rgba(212,175,55,.6)}
  .pv-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .pv-cards span{height:48px;border-radius:8px;background:#121214;border:1px solid var(--line-soft);display:block;position:relative}
  .pv-cards span::before{content:'';position:absolute;top:9px;left:9px;width:15px;height:15px;border-radius:4px;background:rgba(212,175,55,.45)}

  .formcard{border:1px solid var(--line);border-radius:20px;background:linear-gradient(180deg,var(--panel),#0b0b0d);overflow:hidden;box-shadow:0 40px 100px -50px rgba(0,0,0,.9)}
  .formhead{padding:26px 26px 0}
  .formhead .kicker{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:6px}
  .formhead h2{font-family:'Playfair Display',serif;font-weight:700;font-size:26px;line-height:1.15}
  .formhead p{font-size:13px;color:var(--txt-dim);margin-top:8px;font-weight:300}

  .progress{padding:20px 26px 4px}
  .ptrack{height:5px;border-radius:99px;background:rgba(255,255,255,.06);overflow:hidden}
  .pfill{height:100%;width:16.6%;border-radius:99px;background:linear-gradient(90deg,var(--gold),var(--gold-soft));transition:width .5s cubic-bezier(.22,1,.36,1)}
  .pmeta{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
  .pmeta .step{font-size:11px;letter-spacing:1px;color:var(--txt-faint);text-transform:uppercase}
  .pmeta .step b{color:var(--gold)}
  .dots{display:flex;gap:6px}
  .dot{width:7px;height:7px;border-radius:99px;background:rgba(255,255,255,.12);transition:.3s}
  .dot.on{background:var(--gold);box-shadow:0 0 10px rgba(212,175,55,.6)}
  .dot.done{background:var(--gold-soft)}

  form{padding:8px 26px 26px}
  .step-panel{display:none;animation:fade .45s ease}
  .step-panel.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

  .field{margin-bottom:20px}
  .field:last-child{margin-bottom:0}
  label.q{display:block;font-size:14px;font-weight:600;margin-bottom:9px;color:var(--txt)}
  label.q .opt{font-weight:400;color:var(--txt-faint);font-size:12px}
  input[type=text],input[type=email],input[type=tel],textarea{width:100%;background:var(--bg-soft);border:1px solid var(--line-soft);border-radius:12px;color:var(--txt);font-family:inherit;font-size:15px;padding:14px 15px;transition:border-color .2s,box-shadow .2s,background .2s;resize:vertical}
  textarea{min-height:88px}
  input::placeholder,textarea::placeholder{color:#5a5a5a}
  input:focus,textarea:focus{outline:none;border-color:var(--gold);background:#0c0c0d;box-shadow:0 0 0 4px rgba(212,175,55,.10)}

  .chips{display:flex;flex-wrap:wrap;gap:9px}
  .chip{border:1px solid var(--line-soft);background:var(--bg-soft);color:var(--txt-dim);padding:11px 15px;border-radius:11px;font-size:13.5px;font-weight:500;cursor:pointer;transition:.18s;user-select:none}
  .chip:hover{border-color:var(--line);color:var(--txt)}
  .chip.sel{background:rgba(212,175,55,.12);border-color:var(--gold);color:var(--gold-soft);box-shadow:0 0 0 3px rgba(212,175,55,.08)}

  .toggle{display:flex;gap:10px}
  .toggle button{flex:1;border:1px solid var(--line-soft);background:var(--bg-soft);color:var(--txt-dim);padding:13px;border-radius:11px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:.18s}
  .toggle button.sel{background:rgba(212,175,55,.12);border-color:var(--gold);color:var(--gold-soft)}

  .pg-hp{position:absolute!important;left:-9999px!important;opacity:0;height:0;width:0;overflow:hidden}

  .nav{display:flex;gap:12px;margin-top:26px}
  .btn{font-family:inherit;font-weight:600;font-size:15px;border-radius:12px;cursor:pointer;padding:15px 20px;border:1px solid transparent;transition:.2s;letter-spacing:.2px}
  .btn-back{background:transparent;border-color:var(--line-soft);color:var(--txt-dim);flex:0 0 auto;padding:15px 22px}
  .btn-back:hover{border-color:var(--line);color:var(--txt)}
  .btn-next{flex:1;background:linear-gradient(135deg,var(--gold),var(--gold-soft));color:#1a1500;box-shadow:0 16px 40px -16px rgba(212,175,55,.7)}
  .btn-next:hover{transform:translateY(-1px);filter:brightness(1.05)}
  .btn-next:active{transform:translateY(0)}
  .btn-submit{flex:1;background:linear-gradient(135deg,#1faa55,#25d366);color:#04230f;box-shadow:0 16px 40px -16px rgba(37,211,102,.7);display:flex;align-items:center;justify-content:center;gap:9px}
  .btn-submit:hover{transform:translateY(-1px);filter:brightness(1.05)}

  .hint{font-size:11.5px;color:var(--txt-faint);margin-top:14px;text-align:center;line-height:1.5}
  .hint b{color:var(--gold-soft);font-weight:600}
  .hint.left{text-align:left;margin-top:9px}

  .done-screen{display:none;text-align:center;padding:30px 10px 8px}
  .done-screen.show{display:block;animation:fade .5s ease}
  .done-screen .check{width:74px;height:74px;border-radius:99px;margin:0 auto 18px;display:grid;place-items:center;background:rgba(37,211,102,.12);border:1px solid rgba(37,211,102,.4);font-size:36px}
  .done-screen h3{font-family:'Playfair Display',serif;font-size:26px;margin-bottom:10px}
  .done-screen p{color:var(--txt-dim);font-size:14px;max-width:380px;margin:0 auto 22px}
  .done-screen a.wa{display:inline-flex;gap:9px;align-items:center;background:linear-gradient(135deg,#1faa55,#25d366);color:#04230f;font-weight:700;text-decoration:none;padding:14px 26px;border-radius:12px}

  .foot{text-align:center;margin-top:30px;font-size:11px;color:var(--txt-faint);letter-spacing:.5px}
  .foot .pg{display:block;margin-top:8px;color:var(--txt-dim)}
  .foot .pg b{color:var(--gold-soft)}

  .wa-float{position:fixed;right:18px;bottom:18px;z-index:50;display:flex;align-items:center;gap:10px;text-decoration:none;background:linear-gradient(135deg,#1faa55,#25d366);color:#04230f;font-weight:700;font-size:14px;padding:13px 18px;border-radius:999px;box-shadow:0 14px 36px -10px rgba(37,211,102,.7);animation:pop .6s .8s both}
  @keyframes pop{from{transform:scale(.7) translateY(20px);opacity:0}to{transform:none;opacity:1}}
  .wa-float svg{width:20px;height:20px}

  @media(max-width:480px){
    .perks{gap:7px}.perk{padding:13px 4px}.perk .ic{font-size:19px}
    .offer .price{font-size:54px}
    form,.formhead,.progress{padding-left:18px;padding-right:18px}
    .wa-float span{display:none}.wa-float{padding:14px;border-radius:99px}
    .brand{font-size:22px}
  }
  /* ── Secciones de confianza (añadidas) ── */
  .sec{margin-top:34px}
  .sec-title{font-family:'Playfair Display',serif;font-weight:700;font-size:22px;text-align:center;margin-bottom:18px}
  .incl{border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,var(--panel),#0b0b0d);padding:24px}
  .incl ul{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:12px 18px}
  .incl li{display:flex;gap:9px;align-items:flex-start;font-size:13.5px;color:var(--txt-dim)}
  .incl li::before{content:'✓';color:var(--gold);font-weight:700;flex:0 0 auto}
  .steps3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .stp{border:1px solid var(--line-soft);border-radius:14px;background:var(--bg-soft);padding:18px 14px;text-align:center}
  .stp .n{width:34px;height:34px;border-radius:99px;margin:0 auto 10px;display:grid;place-items:center;background:rgba(212,175,55,.14);color:var(--gold);font-weight:700;font-family:'Playfair Display',serif}
  .stp b{display:block;font-size:13px;margin-bottom:5px}
  .stp span{font-size:11.5px;color:var(--txt-faint);line-height:1.5}
  .anchor{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .acol{border-radius:14px;padding:20px 18px;border:1px solid var(--line-soft)}
  .acol.bad{background:var(--bg-soft);opacity:.8}
  .acol.good{background:linear-gradient(160deg,rgba(212,175,55,.10),#0c0c0e);border-color:var(--gold)}
  .acol h4{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;color:var(--txt-faint)}
  .acol.good h4{color:var(--gold)}
  .acol p{font-size:13.5px;margin-bottom:6px;color:var(--txt-dim)}
  .acol .big{font-family:'Playfair Display',serif;font-size:28px;font-weight:800;color:#fff;margin-bottom:10px}
  .acol.good .big{color:var(--gold)}
  .founder{display:flex;gap:18px;align-items:center;border:1px solid var(--line);border-radius:18px;background:linear-gradient(160deg,var(--panel),#0b0b0d);padding:22px}
  .founder .pic{width:78px;height:78px;border-radius:99px;flex:0 0 auto;background:linear-gradient(135deg,var(--gold),var(--gold-soft));display:grid;place-items:center;color:#1a1500;font-family:'Playfair Display',serif;font-weight:800;font-size:28px;overflow:hidden}
  .founder .pic img{width:100%;height:100%;object-fit:cover}
  .founder .who b{font-family:'Playfair Display',serif;font-size:18px}
  .founder .who .role{font-size:12px;color:var(--gold-soft);text-transform:uppercase;letter-spacing:1px;margin:2px 0 8px}
  .founder .who p{font-size:13px;color:var(--txt-dim);line-height:1.55}
  .urg{margin-top:22px;border:1px dashed var(--gold);border-radius:12px;background:rgba(212,175,55,.06);padding:14px 16px;text-align:center;font-size:13.5px;color:var(--gold-soft);font-weight:600}
  .faq details{border:1px solid var(--line-soft);border-radius:12px;background:var(--bg-soft);margin-bottom:10px;overflow:hidden}
  .faq summary{padding:15px 16px;font-size:14px;font-weight:600;cursor:pointer;list-style:none;display:flex;justify-content:space-between;gap:10px;color:var(--txt)}
  .faq summary::-webkit-details-marker{display:none}
  .faq summary::after{content:'+';color:var(--gold);font-weight:700;font-size:18px;line-height:1}
  .faq details[open] summary::after{content:'–'}
  .faq details p{padding:0 16px 15px;font-size:13px;color:var(--txt-dim);line-height:1.6}
  @media(max-width:480px){
    .incl ul{grid-template-columns:1fr}
    .steps3{grid-template-columns:1fr;gap:10px}
    .stp{display:flex;align-items:center;gap:14px;text-align:left}.stp .n{margin:0}
    .founder{flex-direction:column;text-align:center}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand">VGA<small>Vista Growth Agency</small></div>
    <div class="lang" id="langSwitch">
      <button type="button" data-lang="es" class="on">ES</button>
      <button type="button" data-lang="en">EN</button>
    </div>
  </div>

  <section class="hero">
    <div class="eyebrow" data-i18n="eyebrow"></div>
    <h1 data-i18n="h1"></h1>
    <p class="sub" data-i18n="sub"></p>

    <div class="offer">
      <div class="price"><span class="one" data-i18n="only"></span>$<b>197</b></div>
      <div class="pay" data-i18n="pay"></div>
    </div>

    <div class="perks">
      <div class="perk"><span class="ic">⚡</span><b data-i18n="perk1a"></b><span data-i18n="perk1b"></span></div>
      <div class="perk"><span class="ic">🛡️</span><b data-i18n="perk2a"></b><span data-i18n="perk2b"></span></div>
      <div class="perk"><span class="ic">📱</span><b data-i18n="perk3a"></b><span data-i18n="perk3b"></span></div>
    </div>

    <div class="pv-label" data-i18n="pvLabel"></div>
    <div class="preview" aria-hidden="true">
      <div class="pv-bar"><span class="d r"></span><span class="d y"></span><span class="d g"></span><div class="pv-url">tunegocio.com</div></div>
      <div class="pv-body">
        <div class="pv-nav"><span class="lg">VGA</span><span class="sp"></span><i></i><i></i><i></i></div>
        <div class="pv-hero"><div class="l"></div><div class="l g"></div><div class="l s"></div><div class="b"></div></div>
        <div class="pv-cards"><span></span><span></span><span></span></div>
      </div>
    </div>
  </section>

  <!-- QUÉ INCLUYE -->
  <div class="sec">
    <h3 class="sec-title" data-i18n="inclTitle"></h3>
    <div class="incl"><ul data-i18n="inclList"></ul></div>
  </div>

  <!-- CÓMO FUNCIONA -->
  <div class="sec">
    <h3 class="sec-title" data-i18n="howTitle"></h3>
    <div class="steps3">
      <div class="stp"><div class="n">1</div><b data-i18n="how1t"></b><span data-i18n="how1d"></span></div>
      <div class="stp"><div class="n">2</div><b data-i18n="how2t"></b><span data-i18n="how2d"></span></div>
      <div class="stp"><div class="n">3</div><b data-i18n="how3t"></b><span data-i18n="how3d"></span></div>
    </div>
  </div>

  <!-- ANCLA DE PRECIO -->
  <div class="sec">
    <h3 class="sec-title" data-i18n="anchorTitle"></h3>
    <div class="anchor">
      <div class="acol bad"><h4 data-i18n="anchorBadT"></h4><div class="big" data-i18n="anchorBadP"></div><p data-i18n="anchorBad1"></p><p data-i18n="anchorBad2"></p></div>
      <div class="acol good"><h4 data-i18n="anchorGoodT"></h4><div class="big">$197</div><p data-i18n="anchorGood1"></p><p data-i18n="anchorGood2"></p></div>
    </div>
  </div>

  <!-- FUNDADOR -->
  <div class="sec">
    <div class="founder">
      <div class="pic"><img src="josue.jpg" alt="Josué Garibay" onerror="this.style.display='none';this.parentNode.textContent='JG'"></div>
      <div class="who">
        <b data-i18n="founderName"></b>
        <div class="role" data-i18n="founderRole"></div>
        <p data-i18n="founderNote"></p>
      </div>
    </div>
  </div>

  <!-- URGENCIA -->
  <div class="urg" data-i18n="urg"></div>

  <div class="formcard">
    <div class="formhead">
      <div class="kicker" data-i18n="kicker"></div>
      <h2 data-i18n="formTitle"></h2>
      <p data-i18n="formIntro"></p>
    </div>

    <div class="progress">
      <div class="ptrack"><div class="pfill" id="pfill"></div></div>
      <div class="pmeta">
        <div class="step" id="stepLabel"></div>
        <div class="dots" id="dots"></div>
      </div>
    </div>

    <form id="briefForm" novalidate>
      <!-- honeypot anti-bot: nombre NO semantico + bloqueo de autofill/gestores de contrasenas
           para que el navegador NO lo rellene solo (eso bloqueaba a humanos reales). -->
      <input type="text" class="pg-hp" name="pg_hp_token" id="pg_hp_token" tabindex="-1"
             autocomplete="off" aria-hidden="true" data-lpignore="true" data-1p-ignore data-form-type="other">

    pfill.style.width = (((cur+1)/total)*100)+'%';
    var name = lang==='es'? panels[cur].getAttribute('data-name') : panels[cur].getAttribute('data-name-en');
    stepLabel.innerHTML = t.stepWord+' <b>'+(cur+1)+'</b> '+t.ofWord+' '+total+' · '+name;
    dotEls.forEach(function(d,i){ d.classList.toggle('on',i===cur); d.classList.toggle('done',i<cur); });
    backBtn.style.display = cur===0 ? 'none':'block';
    var last = cur===total-1;
    nextBtn.style.display   = last ? 'none':'block';
    submitBtn.style.display = last ? 'flex':'none';
    var card=document.querySelector('.formcard'); if(card) card.scrollIntoView({behavior:'smooth',block:'start'});
  }

  nextBtn.addEventListener('click',function(){ if(cur<total-1){cur++;render();} });
  backBtn.addEventListener('click',function(){ if(cur>0){cur--;render();} });

  function val(name){var el=form.querySelector('[name="'+name+'"]');return el?el.value.trim():'';}

  function buildMessage(){
    var t=T[lang], m=t.msg, none=m.none, L=[];
    L.push(m.head); L.push('');
    L.push(m.emp);
    L.push('• '+m.neg+': '+(val('negocio')||none));
    L.push('• '+m.giro+': '+(val('giro')||none)); L.push('');
    L.push(m.serv);
    L.push('• '+m.ofr+': '+(val('servicios')||none));
    L.push('• '+m.zon+': '+(val('zonas')||none));
    L.push('• '+m.dif+': '+(val('diferenciador')||none)); L.push('');
    L.push(m.obj);
    var metas = sel.objetivos.map(function(k){return t.chips[k];});
    L.push('• '+m.met+': '+(metas.length?metas.join(', '):none));
    L.push('• '+m.fv+': '+(sel.fotos?t.foto_val[sel.fotos]:none));
    if(val('referencias')) L.push('• '+m.ref+': '+val('referencias'));
    if(val('obligatorio')) L.push('• '+m.must+': '+val('obligatorio')); L.push('');
    L.push(m.dom+': '+(sel.dominio?t.dom_val[sel.dominio]:none)+(val('dominio_url')?(' ('+val('dominio_url')+')'):''));
    L.push(m.mar+': '+m.logo+' '+(sel.logo?t.logo_val[sel.logo]:none)+(val('colores')?(' · '+m.col+': '+val('colores')):'')); L.push('');
    L.push(m.con);
    L.push('• '+m.nom+': '+(val('nombre')||none));
    L.push('• '+m.tel+': '+(val('telefono')||none));
    L.push('• '+m.mail+': '+(val('email')||none));
    return L.join('\n');
  }

  form.addEventListener('submit',function(e){
    e.preventDefault();
    var t=T[lang];
    var url='https://wa.me/'+WA+'?text='+encodeURIComponent(buildMessage());
    if(window.fbq){ try{ fbq('track','Lead'); }catch(_){} }
    document.getElementById('doneTitle').textContent = t.doneTitle.replace('{n}', val('nombre') || (lang==='es'?'crack':'champ'));
    document.getElementById('donePara').textContent = t.donePara;
    var wa=document.getElementById('doneWa'); wa.setAttribute('href',url); wa.textContent=t.doneBtn;
    form.style.display='none';
    document.querySelector('.progress').style.display='none';
    document.getElementById('doneScreen').classList.add('show');
    window.open(url,'_blank');
  });

  // Idioma inicial: ?lang=en/es manda; si no, detecta el del navegador.
  var paramLang=(location.search.match(/[?&]lang=(en|es)/)||[])[1];
  // Default ESPANOL (campaña enfocada a negocios latinos). Si el navegador esta
  // en ingles, se lo mostramos en ingles automatico. ?lang= manda sobre todo.
  var startLang=paramLang || ((navigator.language||'').toLowerCase().indexOf('en')===0?'en':'es');
  applyLang(startLang);
})();
</script>
</body>
</html>
